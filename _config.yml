# ----
# Site

# Brand constant: canonical spelling is "DocGPT.ai" — use it in all copy.
# Spelling variants (DocGPT, "DocGPT.AI", DocGPT AI) live only in schema alternateName.
title: "DocGPT.ai"
tagline: "GPT for Sheets & AI Add-ons for Google Workspace: ChatGPT, Claude & Gemini in Sheets, Docs & Gmail"
url: "https://docgpt.ai"
baseurl:
locale: en_US
google_analytics_key: G-DV5BH9XVVS
google_maps_javascript_api_key:
disqus_shortname:

# Values for the jekyll-seo-tag gem (https://github.com/jekyll/jekyll-seo-tag)
logo: /favicon.png
description: "DocGPT.ai builds AI add-ons for Google Workspace: GPT for Sheets, Mail Merge for Gmail, AI Email Assistant and more. GPT, Claude & Gemini built in — no API keys needed."
author:
  name: Yaro
  email: yaroslav91@gmail.com
  twitter: ski0xFF
social:
  name: DocGPT.ai
  links:
    - https://twitter.com/ski0xFF
    - https://www.linkedin.com/company/docgpt-ai

twitter:
  username: ski0xFF
  card: summary
# -----
# Build

timezone: Etc/UTC

collections:
  staff_members:
    _hide_content: true

paginate: 10
paginate_path: "/blog/:num/"
permalink: pretty



defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      _options:
        content:
          width: 1500
          height: 2500
  - scope:
      path: ""
      type: "staff_members"
    values:
      _options:
        image_path:
          width: 600
          height: 600
  - scope:
      path: ""
    values:
      layout: "page"
      # Default social-share image (square brand logo); pages with their own
      # `image` front matter override it. Dimensions let jekyll-seo-tag emit
      # og:image:width/height.
      image:
        path: /siteicon.png
        width: 480
        height: 480
  - scope:
      path: "index.html"
    values:
      layout: "default"
#  - scope:
#      path: "docs"
#    values:
#      layout: "docs_layouts/page"
  - scope:
      path: "contact.html"
    values:
      full_width: true
  - scope:
      path: "feedback_docs_window.html"
    values:
      sitemap: false
  - scope:
      path: "feedback_gmail_window.html"
    values:
      sitemap: false
  - scope:
      path: "feedback_slides_window.html"
    values:
      sitemap: false
  - scope:
      path: "contact-success"
    values:
      sitemap: false
  - scope:
      path: "knoledgebase.html"
    values:
      sitemap: false
  - scope:
      path: "contact"
    values:
      sitemap: false

#jekyll-archives:
#  enabled:
#    - categories

plugins:
#  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
#  - jekyll-paginate

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  - _redirects

include:
  - _redirects
# CloudCannon

_select_data:
  social_icons:
    - Facebook
    - Instagram
    - LinkedIn
    - Pinterest
    - Tumblr
    - Twitter
    - YouTube
    - RSS

_comments:
  map: Update the map location and display settings.
  latitude: Coordinates for the center marker on the map.
  longitude: Coordinates for the center marker on the map.
  zoom: The zoom level for the map.
  pricing_table: Update the information in the pricing tables.
  highlight: Emphasis the text
  color: The background colour used in the plan name and call to action.
  new_window: Open link in new window
